version: '3'

services:

  redis:
    image: redis
    ports:
      - "6379:6379"

  mongo:
    image: mongo
    ports:
      - "27017:27017"

  api-service:
    build: ./api-service
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - mongo

  worker-service:
    build: ./worker-service
    depends_on:
      - redis
      - mongo
